<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 6 Quiz - General Anatomy and Physiology - Barber Study Pro</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #1a1a1a;
            --dark-gray: #2d2d2d;
            --medium-gray: #3d3d3d;
            --light-gray: #888;
            --white: #f5f5f5;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--white);
            line-height: 1.6;
        }
        .progress-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--dark-gray); z-index: 1000;
        }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
        nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: sticky; top: 4px;
            border-bottom: 1px solid var(--medium-gray);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--gold); text-decoration: none; }
        .back-link { color: var(--light-gray); text-decoration: none; }
        .back-link:hover { color: var(--gold); }
        .container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .quiz-header { text-align: center; margin-bottom: 3rem; }
        .quiz-header h1 { color: var(--gold); margin-bottom: 1rem; }
        .quiz-header p { color: var(--light-gray); }
        .quiz-section { background: var(--medium-gray); border-radius: 12px; padding: 2rem; margin: 3rem 0; border: 1px solid var(--gold); }
        .quiz-section h2 { color: var(--gold); margin-bottom: 1.5rem; }
        .quiz-question { margin-bottom: 1.5rem; }
        .quiz-question p { font-weight: 600; margin-bottom: 0.75rem; color: var(--white); }
        .quiz-options label { display: block; padding: 0.75rem 1rem; margin-bottom: 0.5rem; background: var(--dark-gray); border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .quiz-options label:hover { background: rgba(212, 175, 55, 0.1); }
        .quiz-options input[type="radio"] { margin-right: 0.75rem; }
        .quiz-submit { background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .quiz-result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; }
        .quiz-result.correct { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; }
        .quiz-result.incorrect { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⚡ Barber Study Pro</a>
            <a href="chapter-06.html" class="back-link">← Back to Chapter 6</a>
        </div>
    </nav>
    <div class="container">
        <div class="quiz-header">
            <h1>Chapter 6: General Anatomy and Physiology</h1>
            <p>Comprehensive Review Quiz - 45 Questions</p>
        </div>
        <section class="quiz-section">
            <h2>📝 Chapter 6 Comprehensive Review Quiz</h2>
            <p style="color: var(--light-gray); margin-bottom: 2rem;">Test your knowledge of the eleven body systems, bones, muscles, nerves, and circulation.</p>
            <div id="quiz-container"></div>
            <button class="quiz-submit" onclick="checkQuiz()">Check Answers</button>
            <div class="quiz-result" id="quiz-result"></div>
        </section>
    </div>
    <script>
        const quizData = [
            {q: "1. What does the ending '-ology' mean?", a: ["Body part", "Study of", "Disease", "Treatment"], correct: 1},
            {q: "2. What is anatomy?", a: ["Study of body functions", "Study of human body structures that can be seen with the naked eye", "Study of diseases", "Study of cells"], correct: 1},
            {q: "3. What is physiology?", a: ["Study of body structures", "Study of functions and activities performed by the body's structures", "Study of bones", "Study of muscles"], correct: 1},
            {q: "4. How many body systems are there?", a: ["8", "9", "10", "11"], correct: 3},
            {q: "5. Which system controls the movement of blood throughout the body?", a: ["Respiratory system", "Circulatory system", "Nervous system", "Digestive system"], correct: 1},
            {q: "6. Which system provides protective covering and regulates body temperature?", a: ["Skeletal system", "Integumentary system", "Muscular system", "Endocrine system"], correct: 1},
            {q: "7. How many bones are in the human body?", a: ["186", "196", "206", "216"], correct: 2},
            {q: "8. What is the hardest tissue in the body?", a: ["Muscle", "Bone", "Cartilage", "Skin"], correct: 1},
            {q: "9. What is the study of bones called?", a: ["Myology", "Osteology", "Neurology", "Dermatology"], correct: 1},
            {q: "10. What is the largest and strongest bone of the face?", a: ["Maxilla", "Mandible", "Zygomatic bone", "Frontal bone"], correct: 1},
            {q: "11. How many bones are in the cranium?", a: ["6", "7", "8", "9"], correct: 2},
            {q: "12. How many bones are in the facial skeleton?", a: ["12", "13", "14", "15"], correct: 2},
            {q: "13. Which bone forms the forehead?", a: ["Parietal bone", "Frontal bone", "Temporal bone", "Occipital bone"], correct: 1},
            {q: "14. Which bones form the prominence of the cheeks?", a: ["Maxillae", "Zygomatic bones", "Nasal bones", "Lacrimal bones"], correct: 1},
            {q: "15. What is the U-shaped bone at the base of the tongue?", a: ["Cervical vertebrae", "Hyoid bone", "Mandible", "Clavicle"], correct: 1},
            {q: "16. How many cervical vertebrae are there?", a: ["5", "6", "7", "8"], correct: 2},
            {q: "17. What is the largest bone of the arm?", a: ["Radius", "Ulna", "Humerus", "Clavicle"], correct: 2},
            {q: "18. How many bones are in each hand?", a: ["24", "26", "27", "28"], correct: 2},
            {q: "19. What is the study of muscles called?", a: ["Osteology", "Myology", "Neurology", "Cardiology"], correct: 1},
            {q: "20. How many muscles are in the human body?", a: ["Over 300", "Over 400", "Over 500", "Over 600"], correct: 3},
            {q: "21. What percentage of body weight do muscles comprise?", a: ["20-30%", "30-40%", "40-50%", "50-60%"], correct: 2},
            {q: "22. Which muscle raises the eyebrows and causes wrinkles across the forehead?", a: ["Occipitalis", "Frontalis", "Temporalis", "Masseter"], correct: 1},
            {q: "23. Which muscle draws the scalp backward?", a: ["Frontalis", "Occipitalis", "Epicranius", "Platysma"], correct: 1},
            {q: "24. Which muscles are the chewing muscles?", a: ["Masseter and temporalis", "Buccinator and risorius", "Frontalis and occipitalis", "Platysma and sternocleidomastoid"], correct: 0},
            {q: "25. Which muscle depresses the lower jaw and lip?", a: ["Masseter", "Platysma", "Temporalis", "Buccinator"], correct: 1},
            {q: "26. Which muscle enables you to close your eyes?", a: ["Corrugator", "Orbicularis oculi", "Frontalis", "Levator palpebrae superioris"], correct: 1},
            {q: "27. Which muscle compresses the cheeks and expels air between the lips?", a: ["Risorius", "Buccinator", "Mentalis", "Orbicularis oris"], correct: 1},
            {q: "28. Which muscle puckers the lips?", a: ["Risorius", "Orbicularis oris", "Mentalis", "Buccinator"], correct: 1},
            {q: "29. Which muscle lifts the forearm and flexes the elbow?", a: ["Tricep", "Deltoid", "Bicep", "Trapezius"], correct: 2},
            {q: "30. Which muscle extends the forearm?", a: ["Bicep", "Deltoid", "Tricep", "Trapezius"], correct: 2},
            {q: "31. What is the study of the nervous system called?", a: ["Myology", "Neurology", "Osteology", "Cardiology"], correct: 1},
            {q: "32. How many pairs of cranial nerves are there?", a: ["10", "11", "12", "13"], correct: 2},
            {q: "33. Which is the largest cranial nerve?", a: ["Seventh cranial nerve", "Fifth cranial nerve", "Eleventh cranial nerve", "First cranial nerve"], correct: 1},
            {q: "34. What is another name for the fifth cranial nerve?", a: ["Facial nerve", "Trifacial or trigeminal nerve", "Accessory nerve", "Optic nerve"], correct: 1},
            {q: "35. Which cranial nerve is the chief motor nerve of the face?", a: ["Fifth cranial nerve", "Seventh cranial nerve", "Eleventh cranial nerve", "Third cranial nerve"], correct: 1},
            {q: "36. What is the heart often referred to as?", a: ["The body's engine", "The body's pump", "The body's battery", "The body's filter"], correct: 1},
            {q: "37. What is the largest artery in the body?", a: ["Carotid artery", "Aorta", "Jugular vein", "Pulmonary artery"], correct: 1},
            {q: "38. Which blood vessels carry blood away from the heart?", a: ["Veins", "Capillaries", "Arteries", "Venules"], correct: 2},
            {q: "39. Which blood vessels carry blood back to the heart?", a: ["Arteries", "Veins", "Capillaries", "Arterioles"], correct: 1},
            {q: "40. How much blood is in the human body?", a: ["4 to 6 pints", "6 to 8 pints", "8 to 10 pints", "10 to 12 pints"], correct: 2},
            {q: "41. What percentage of blood is water?", a: ["60%", "70%", "80%", "90%"], correct: 2},
            {q: "42. Which arteries supply blood to the head, face, and neck?", a: ["Jugular arteries", "Carotid arteries", "Femoral arteries", "Subclavian arteries"], correct: 1},
            {q: "43. What is lymph?", a: ["Red blood cells", "A clear fluid that circulates in the lymph spaces", "White blood cells", "Platelets"], correct: 1},
            {q: "44. What does the word 'integument' mean?", a: ["Internal organ", "A natural covering", "Body cavity", "Muscle tissue"], correct: 1},
            {q: "45. Which glands release hormonal secretions directly into the bloodstream?", a: ["Exocrine glands", "Endocrine glands", "Sweat glands", "Oil glands"], correct: 1}
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            quizData.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'quiz-question';
                qDiv.innerHTML = `
                    <p>${item.q}</p>
                    <div class="quiz-options">
                        ${item.a.map((opt, i) => `
                            <label><input type="radio" name="q${index + 1}" value="${i}"> ${opt}</label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function checkQuiz() {
            let score = 0;
            let total = quizData.length;
            
            quizData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index + 1}"]:checked`);
                if (selected && parseInt(selected.value) === item.correct) score++;
            });
            
            const resultDiv = document.getElementById('quiz-result');
            resultDiv.style.display = 'block';
            if (score === total) {
                resultDiv.className = 'quiz-result correct';
                resultDiv.innerHTML = `<strong>Perfect! 🎉</strong> You got ${score}/${total} correct!`;
            } else {
                resultDiv.className = 'quiz-result incorrect';
                resultDiv.innerHTML = `<strong>Keep studying!</strong> You got ${score}/${total} correct.`;
            }
        }

        renderQuiz();

        window.addEventListener('scroll', () => {
            const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            document.getElementById('progress').style.width = scrolled + '%';
        });
    </script>
</body>
</html>
