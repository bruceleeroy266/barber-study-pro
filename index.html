<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Study Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0D0D0D 0%, #1A1A1A 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 1rem;
            color: #9CA3AF;
            margin-bottom: 40px;
            text-align: center;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 25px 30px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-icon {
            font-size: 2rem;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn-label {
            font-size: 1.3rem;
        }

        .btn-desc {
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 3px;
        }

        /* Gold gradient buttons */
        .btn-quiz {
            background: linear-gradient(135deg, #C9A227 0%, #A88420 100%);
        }

        .btn-study {
            background: linear-gradient(135deg, #E5C158 0%, #C9A227 100%);
            color: #0D0D0D;
        }

        .btn-progress {
            background: linear-gradient(135deg, #2D2D2D 0%, #1A1A1A 100%);
            border: 2px solid #C9A227;
        }

        .btn-exam {
            background: linear-gradient(135deg, #A88420 0%, #8B6914 100%);
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            color: #6B7280;
            font-size: 0.85rem;
        }

        @media (min-width: 768px) {
            .actions {
                grid-template-columns: 1fr 1fr;
                max-width: 700px;
            }
        }
    </style>
</head>
<body>
    <div class="logo">✂️</div>
    <h1>Barber Study Pro</h1>
    <p class="subtitle">Master your state board exam</p>

    <div class="actions">
        <a href="chapter-01-quiz.html" class="action-btn btn-quiz">
            <span class="btn-icon">🧪</span>
            <span class="btn-text">
                <span class="btn-label">Start Quiz</span>
                <span class="btn-desc">Quick practice questions</span>
            </span>
        </a>

        <a href="chapter-01.html" class="action-btn btn-study">
            <span class="btn-icon">📚</span>
            <span class="btn-text">
                <span class="btn-label">Study Topics</span>
                <span class="btn-desc">21 comprehensive chapters</span>
            </span>
        </a>

        <a href="my-progress.html" class="action-btn btn-progress">
            <span class="btn-icon">📊</span>
            <span class="btn-text">
                <span class="btn-label">View Progress</span>
                <span class="btn-desc">Track your learning</span>
            </span>
        </a>

        <a href="final-exam.html" class="action-btn btn-exam">
            <span class="btn-icon">🎯</span>
            <span class="btn-text">
                <span class="btn-label">Practice Exam</span>
                <span class="btn-desc">Full exam simulation</span>
            </span>
        </a>
    </div>

    <div class="footer">
        <p>Pass your state board exam with confidence</p>
    </div>
</body>
</html>
