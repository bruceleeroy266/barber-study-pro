<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Study Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0D0D0D;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px;
            color: white;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 2.5rem; margin-bottom: 5px; }
        h1 { font-size: 1.5rem; font-weight: 700; }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 25px 15px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            color: white;
            text-align: center;
            min-height: 120px;
        }
        .action-btn:hover { transform: scale(1.03); }
        .btn-icon { font-size: 2.5rem; }
        .btn-quiz { background: linear-gradient(135deg, #C9A227 0%, #A88420 100%); }
        .btn-study { background: linear-gradient(135deg, #E5C158 0%, #C9A227 100%); color: #0D0D0D; }
        .btn-progress { background: #1A1A1A; border: 2px solid #C9A227; }
        .btn-exam { background: linear-gradient(135deg, #A88420 0%, #8B6914 100%); }
        @media (max-width: 400px) {
            .actions { grid-template-columns: 1fr; }
            .action-btn { min-height: 80px; flex-direction: row; justify-content: flex-start; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">✂️</div>
        <h1>Barber Study Pro</h1>
    </div>
    <div class="actions">
        <a href="chapter-01-quiz.html" class="action-btn btn-quiz">
            <span class="btn-icon">🧪</span>
            <span>Start Quiz</span>
        </a>
        <a href="chapter-01.html" class="action-btn btn-study">
            <span class="btn-icon">📚</span>
            <span>Study Topics</span>
        </a>
        <a href="my-progress.html" class="action-btn btn-progress">
            <span class="btn-icon">📊</span>
            <span>Progress</span>
        </a>
        <a href="final-exam.html" class="action-btn btn-exam">
            <span class="btn-icon">🎯</span>
            <span>Practice Exam</span>
        </a>
    </div>
</body>
</html>
