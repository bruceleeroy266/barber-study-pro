        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }

        .progress-bar { position: fixed; top: 65px; left: 0; right: 0; height: 3px; background: var(--medium-gray); z-index: 999; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
        .question { background: var(--dark-gray); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--medium-gray); }
        .question-number { display: inline-block; background: var(--gold); color: var(--dark); padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 700; font-size: 0.875rem; margin-bottom: 1rem; }
        .question-text { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.5rem; }
        .options label { display: block; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: var(--medium-gray); border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .options label:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); }
        .options input[type="radio"] { margin-right: 0.75rem; }
        .submit-btn { background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 2rem; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
        .results { background: var(--dark-gray); border-radius: 12px; padding: 2rem; margin-top: 2rem; text-align: center; display: none; }
        .results.show { display: block; }
        .score { font-size: 3rem; font-weight: 800; color: var(--gold); margin-bottom: 1rem; }
        .results-message { font-size: 1.25rem; margin-bottom: 1.5rem; }
        .review-item { text-align: left; padding: 1rem; margin: 0.5rem 0; border-radius: 8px; }
        .review-item.correct { background: rgba(34, 197, 94, 0.1); border-left: 4px solid var(--success); }
        .review-item.incorrect { background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--error); }
        .nav-chapters { display: flex; justify-content: space-between; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--medium-gray); }
        .nav-chapters a { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <nav><div class="nav-container"><a href="index.html" class="logo">⚡ Barber Study Pro</a><a href="chapter-17.html" class="back-link">← Back to Chapter</a></div></nav>
    <header class="quiz-header">

            },
            {

                answer: 1
            },
            {
                question: "What does high porosity hair feel like when tested?",
                options: ["Smooth", "Slightly rough", "Very rough or breaks", "Wet"],
                answer: 2
            },
            {
                question: "What does low porosity (resistant) hair feel like when tested?",
                options: ["Smooth", "Slightly rough", "Very rough", "Wet"],
                answer: 0
            },
            {
                question: "How far from the scalp should relaxer initially be applied?",
                options: ["Directly on scalp", "¼ to ½ inch from scalp", "1 inch from scalp", "2 inches from scalp"],
                answer: 1
            },
            {
                question: "When should relaxer be applied to the scalp?",
                options: ["At the beginning", "In the last few minutes only", "Never", "Halfway through"],
                answer: 1
            },
            {
                question: "What happens if you overlap relaxer on previously relaxed hair?",
                options: ["Nothing", "Damage and possible breakage", "Better results", "Faster processing"],

            },
            {

                options: ["Shampoo", "Protective base cream", "Conditioner", "Oil"],

            },
            {
                question: "Are hydroxide and thio products compatible?",
                options: ["Yes", "No, they are not compatible", "Only sometimes", "Only on certain hair types"],
                answer: 1
            },
            {
                question: "What type of shampoo should be used after relaxers?",
                options: ["Any shampoo", "Neutralizing shampoo", "Clarifying shampoo", "Moisturizing shampoo"],
                answer: 1
            },
            {
                question: "What is curl reformation (soft-curl perm)?",
                options: ["Just a perm", "Just a relaxer", "Relaxing then re-curling to create softer curls", "Coloring hair"],
                answer: 2
            },
            {
                question: "What determines the size of the curl in a permanent wave?",
                options: ["The shampoo used", "The size of the rods", "The temperature", "The color"],
                answer: 1
            },
            {
                question: "What bonds do chemical texture services break and reform?",
                options: ["Hydrogen bonds", "Salt bonds", "Disulfide bonds", "Peptide bonds"],
                answer: 2
            },
            {
                question: "What should you do before performing any chemical service?",
                options: ["Start immediately", "Perform hair and scalp analysis", "Apply color", "Cut the hair"],
                answer: 1
            },
            {
                question: "What indicates normal porosity when testing?",
                options: ["Smooth feel", "Slight roughness", "Very rough feel", "Hair breaks"],
                answer: 1
            },
            {
                question: "What type of hair requires longer processing time?",
                options: ["Porous hair", "Resistant (low porosity) hair", "Normal hair", "Fine hair"],
                answer: 1
            },
            {
                question: "What type of hair may require shorter processing time?",
                options: ["Resistant hair", "Porous (high porosity) hair", "Normal hair", "Coarse hair"],
                answer: 1
            },
            {
                question: "Should you perform chemical services on hair with scalp disease?",
                options: ["Yes", "No", "Only with permission", "Only if mild"],
                answer: 1
            },
            {
                question: "What should be worn when applying chemical products?",
                options: ["Nothing special", "Gloves", "Mask only", "Eye protection only"],
                answer: 1
            },
            {
                question: "What is the purpose of a strand test?",
                options: ["To check color", "To check processing and timing", "To check length", "To check texture"],
                answer: 1
            },
            {
                question: "What should you do after applying waving solution in a perm?",
                options: ["Immediately rinse", "Process according to manufacturer's directions", "Apply neutralizer", "Remove rods"],
                answer: 1
            },
            {
                question: "What is applied after rinsing waving solution in a perm?",
                options: ["More waving solution", "Neutralizer", "Shampoo", "Conditioner"],
                answer: 1
            },
            {
                question: "What is the most resistant area of the head for relaxer application?",
                options: ["Front hairline", "Back of head/nape area", "Top of head", "Sides"],
                answer: 1
            },
            {
                question: "What should be done to hair before wrapping for a perm?",
                options: ["Deep condition", "Shampoo with no conditioner", "Apply oil", "Blow dry"],
                answer: 1
            },
            {
                question: "What is a spiral wrap used for?",
                options: ["Straightening", "Creating spiral curl pattern", "Sectioning", "Drying"],
                answer: 1
            },
            {
                question: "What is a croquignole wrap?",
                options: ["Wrapping from scalp to ends", "Wrapping from ends to scalp", "Spiral wrapping", "Sectioning"],
                answer: 1
            },
            {
                question: "What should you check for before starting a chemical service?",
                options: ["Hair color only", "Scalp conditions, cuts, abrasions", "Length only", "Style only"],

            },
            {
                question: "What is the first step in the permanent wave process?",
                options: ["Wrapping", "Hair analysis and consultation", "Applying solution", "Rinsing"],

            },
            {
                question: "What is the final step in a perm service?",
                options: ["Applying solution", "Removing rods and styling", "Wrapping", "Sectioning"],

            },
            {
                question: "What should be done with single-use items after chemical services?",
                options: ["Save for next client", "Dispose of them", "Wash and reuse", "Leave on station"],

            },
            {
                question: "What should be used to check curl development during a perm?",
                options: ["Mirror", "Unwind one rod and check S-pattern", "Comb", "Brush"],
                answer: 1
            },
            {
                question: "How often should you check for curl development during processing?",
                options: ["Every 30 seconds", "Every 5 minutes", "Every 30 minutes", "Once at the end"],
                answer: 1
            },
            {
                question: "What should be done if scalp irritation occurs during processing?",
                options: ["Continue processing", "Rinse immediately", "Apply more product", "Wait it out"],
                answer: 1
            },
            {
                question: "What is the purpose of neutralizer in a perm?",
                options: ["To clean hair", "To reform disulfide bonds in new shape", "To add color", "To condition"],
                answer: 1
            },
            {
                question: "What type of wrap creates uniform curl?",
                options: ["Spiral wrap", "Croquignole wrap", "Both are the same", "Neither"],
                answer: 1
            },
            {
                question: "What should be available for all chemical products?",
                options: ["Color chart", "MSDS sheets", "Price list", "Client list"],
                answer: 1
            },
            {
                question: "What should you do if hair breaks during porosity testing?",
                options: ["Continue with service", "Do not perform chemical service", "Apply conditioner", "Cut the hair"],
                answer: 1
            },
            {
                question: "What is texture in hair analysis?",
                options: ["Color", "Fine, medium, or coarse", "Length", "Style"],
                answer: 1
            },
            {
                question: "What is elasticity in hair analysis?",
                options: ["Ability to absorb color", "Ability to stretch and return", "Length of hair", "Thickness"],
                answer: 1
            },
            {
                question: "What should be done after neutralizing in a perm?",
                options: ["Apply more waving solution", "Rinse thoroughly", "Apply color", "Blow dry"],
                answer: 1
            },
            {
                question: "What should be done before applying relaxer to virgin hair?",
                options: ["Deep condition", "Apply protective base cream", "Apply color", "Blow dry"],
                answer: 1
            },
            {
                question: "What is the purpose of sectioning hair for chemical services?",
                options: ["For decoration", "For control and even application", "To cut hair", "To color"],
                answer: 1
            },
            {
                question: "What should you do if the client has open cuts on the scalp?",
                options: ["Proceed carefully", "Do not perform chemical service", "Apply more base cream", "Use milder product"],
                answer: 1
            },
            {
                question: "What is the purpose of rinsing thoroughly after chemical services?",
                options: ["To add shine", "To remove all chemicals", "To condition", "To color"],
                answer: 1
            },
            {
                question: "What should be worn throughout chemical service application?",
                options: ["Nothing special", "Gloves", "Apron only", "Mask only"],
                answer: 1
            },
            {
                question: "What is the main goal of chemical relaxing?",
                options: ["To add curl", "To straighten curly or wavy hair", "To add color", "To condition"],
                answer: 1
            },
            {
                question: "What is the main goal of permanent waving?",
                options: ["To straighten hair", "To add curl or wave to straight hair", "To add color", "To condition"],
                answer: 1
            },
            {
                question: "What should be done with chemical products after use?",
                options: ["Save for next client", "Dispose according to manufacturer", "Leave open", "Pour down drain"],
                answer: 1
            }
        ];

        let userAnswers = new Array(quizData.length).fill(null);

        function renderQuiz() {
            const form = document.getElementById('quiz-form');
            form.innerHTML = quizData.map((q, i) => `
                <div class="question" id="q${i}">
                    <span class="question-number">Question ${i + 1} of ${quizData.length}</span>
                    <p class="question-text">${q.question}</p>
                    <div class="options">
                        ${q.options.map((opt, j) => `
                            <label>
                                <input type="radio" name="q${i}" value="${j}" onchange="selectAnswer(${i}, ${j})">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(a => a !== null).length;
            const progress = (answered / quizData.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function submitQuiz() {
            const answered = userAnswers.filter(a => a !== null).length;
            if (answered < quizData.length) {
                alert(`Please answer all questions. You have ${quizData.length - answered} remaining.`);
                const firstUnanswered = userAnswers.findIndex(a => a === null);
                document.getElementById(`q${firstUnanswered}`).scrollIntoView({ behavior: 'smooth' });
                return;
            }

            let score = 0;
            const review = [];

            quizData.forEach((q, i) => {
                const correct = userAnswers[i] === q.answer;
                if (correct) score++;
                review.push({
                    question: q.question,
                    userAnswer: q.options[userAnswers[i]],
                    correctAnswer: q.options[q.answer],
                    correct: correct
                });
            });

            const percentage = Math.round((score / quizData.length) * 100);
            let message = '';
            if (percentage >= 90) message = '🎉 Excellent! You\'re a chemical texture expert!';
            else if (percentage >= 80) message = '👏 Great job! You know your chemical services!';
            else if (percentage >= 70) message = '👍 Good work! Keep studying!';
            else message = '📚 Keep studying! Review the chapter and try again.';

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="score">${score}/${quizData.length}</div>
                <p class="results-message">${percentage}% — ${message}</p>
                <h3 style="margin: 2rem 0 1rem; color: var(--gold);">Review</h3>
                ${review.map((r, i) => `
                    <div class="review-item ${r.correct ? 'correct' : 'incorrect'}">
                        <strong>Q${i + 1}:</strong> ${r.question}<br>
                        <span style="color: ${r.correct ? 'var(--success)' : 'var(--error)'}">
                            Your answer: ${r.userAnswer} ${r.correct ? '✓' : '✗'}
                        </span>
                        ${!r.correct ? `<br><span style="color: var(--success)">Correct: ${r.correctAnswer}</span>` : ''}
                    </div>
                `).join('')}
                <button class="submit-btn" onclick="retakeQuiz()" style="margin-top: 2rem;">Retake Quiz</button>
            `;
            resultsDiv.classList.add('show');
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function retakeQuiz() {
            userAnswers = new Array(quizData.length).fill(null);
            document.getElementById('results').classList.remove('show');
            renderQuiz();
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderQuiz();
    </script>
</body>
</html>
