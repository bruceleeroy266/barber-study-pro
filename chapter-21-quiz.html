    <style>

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); line-height: 1.7; }

        .back-link { color: var(--light-gray); text-decoration: none; }
        .quiz-header { padding: 8rem 2rem 4rem; background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark) 100%); text-align: center; }
        .quiz-header h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; margin-bottom: 1rem; }
        .quiz-container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
        .progress-bar { position: fixed; top: 65px; left: 0; right: 0; height: 3px; background: var(--medium-gray); z-index: 999; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
        .question { background: var(--dark-gray); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--medium-gray); }
        .question-number { display: inline-block; background: var(--gold); color: var(--dark); padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 700; font-size: 0.875rem; margin-bottom: 1rem; }
        .question-text { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.5rem; }
        .options label { display: block; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: var(--medium-gray); border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .options label:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); }
        .options input[type="radio"] { margin-right: 0.75rem; }
        .submit-btn { background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 2rem; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
        .results { background: var(--dark-gray); border-radius: 12px; padding: 2rem; margin-top: 2rem; text-align: center; display: none; }
        .results.show { display: block; }
        .score { font-size: 3rem; font-weight: 800; color: var(--gold); margin-bottom: 1rem; }
        .results-message { font-size: 1.25rem; margin-bottom: 1.5rem; }
        .review-item { text-align: left; padding: 1rem; margin: 0.5rem 0; border-radius: 8px; }
        .review-item.correct { background: rgba(34, 197, 94, 0.1); border-left: 4px solid var(--success); }
        .review-item.incorrect { background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--error); }
        .nav-chapters { display: flex; justify-content: space-between; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--medium-gray); }
        .nav-chapters a { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

        <div class="nav-chapters"><a href="chapter-20-quiz.html">← Chapter 20 Quiz</a><a href="index.html">Home →</a></div>

            },

            },
            {

            {

            {

            },
            {

                options: ["25%", "53.5%", "75%", "10%"],

            },
            {

                options: ["Only answer phones", "First and last person the client contacts", "Only clean the shop", "Only cut hair"],

            },
            {
                question: "What should be displayed in the reception area?",
                options: ["Nothing", "Price list and business cards", "Only magazines", "Only plants"],

            },
            {
                question: "How many times should a phone ring before answering?",
                options: ["10 times", "No more than three times", "20 times", "Until someone answers"],

            },
            {
                question: "What is upselling?",
                options: ["Lowering prices", "Adding on additional services", "Refusing service", "Closing early"],
                answer: 1
            },
            {
                question: "What is retailing?",
                options: ["Buying products for yourself", "Selling take-home products to clients", "Only using professional products", "Giving products away"],
                answer: 1
            },
            {
                question: "What is cross-promoting?",
                options: ["Refusing services", "Encouraging clients to get additional services", "Only cutting hair", "Closing the shop"],
                answer: 1
            },
            {
                question: "What should you do before using a client's image on social media?",
                options: ["Post it immediately", "Get permission from the client", "Never use images", "Only use celebrity images"],

            },
            {

            },
            {

            },
            {

                options: ["No policies", "A written personnel policies and procedures manual", "Only verbal agreements", "No rules"],

            },
            {

                options: ["A product brand", "Equal Employment Opportunity Commission", "A type of haircut", "A styling tool"],

            },
            {
                question: "What does ADA stand for?",

                answer: 1
            },
            {
                question: "When interviewing employees, what should you consider?",
                options: ["Only their age", "Skill level, grooming, image, attitude, communication", "Only their height", "Only their address"],
                answer: 1
            },
            {
                question: "What should be your top priority regarding payroll?",
                options: ["Delay payments", "Make payroll obligations your top priority", "Skip payments", "Pay only employees you like"],
                answer: 1
            },
            {
                question: "What is a noncompete agreement?",
                options: ["An employment contract", "Agreement that seller won't work within specified distance", "A lease", "A partnership"],

            {

            {

            },
            {

                options: ["Nothing", "Who owns what and who is responsible for repairs", "Only the rent amount", "Only the address"],
                answer: 1
            },
            {
                question: "What is prebooking?",
                options: ["Canceling appointments", "Scheduling next appointment before client leaves", "Refusing appointments", "Closing early"],

            {
                question: "What is the benefit of prebooking?",
                options: ["No benefit", "Guarantees future business", "Reduces income", "Closes the shop"],

            {
                question: "What should you do when handling complaints by phone?",
                options: ["Hang up immediately", "Respond with self-control, tact, and courtesy", "Argue with the caller", "Ignore them"],

            {
                question: "What is inventory management?",
                options: ["Buying random products", "Keeping a running inventory of all supplies", "Never ordering products", "Giving away products"],
                answer: 1
            },
            {
                question: "What are consumption supplies?",
                options: ["Products to sell", "Supplies for daily operations", "Expired products", "Damaged goods"],

            {
                question: "What is the purpose of service records?",
                options: ["To throw away", "To document treatments given and client preferences", "To ignore clients", "To raise prices"],

            {
                question: "What should you do with check stubs and receipts?",
                options: ["Throw them away", "Retain them for record keeping", "Burn them", "Give them to clients"],

            },
            {
                question: "What is the benefit of incorporating?",
                options: ["No benefit", "Protects personal assets from business debts", "Costs more money", "More paperwork only"],
                answer: 1
            },
            {
                question: "What should you do before signing a franchise agreement?",
                options: ["Sign immediately", "Have an attorney read the contract", "Ignore it", "Let a friend sign"],
                answer: 1
            },
            {
                question: "What is the purpose of a business plan's executive summary?",
                options: ["To confuse investors", "To summarize the plan and state objectives", "To list employees", "To describe the building"],
                answer: 1
            },
            {
                question: "What should be included in a marketing plan?",
                options: ["Only prices", "Research on target clients, their needs, wants, and habits", "Only employee names", "Only the address"],
                answer: 1
            },
            {
                question: "What is the purpose of barbershop policies?",
                options: ["To confuse clients", "To ensure all clients and employees are treated fairly", "To raise prices", "To close early"],
                answer: 1
            },
            {
                question: "What should you do for community outreach?",
                options: ["Ignore the community", "Volunteer and participate in charitable affairs", "Only advertise online", "Refuse local clients"],
                answer: 1
            },
            {
                question: "What is the best form of advertising?",
                options: ["Billboards only", "Satisfied clients who refer friends and family", "Radio only", "Newspaper only"],
                answer: 1
            },
            {
                question: "What should a receptionist know thoroughly?",
                options: ["Only how to answer phones", "All retail products", "Only how to clean", "Only how to cut hair"],
                answer: 1
            },
            {
                question: "What is the purpose of confirming appointments?",
                options: ["To cancel them", "To reduce no-shows", "To confuse clients", "To raise prices"],
                answer: 1
            },
            {
                question: "What should you have for all social media accounts?",
                options: ["Different usernames", "The same username", "No username", "Random names"],
                answer: 1
            },
            {
                question: "What is the key to successful selling?",
                options: ["Being pushy", "Being helpful and knowledgeable", "Ignoring clients", "Only selling expensive items"],
                answer: 1
            },
            {
                question: "What should you do to build your business?",
                options: ["Ignore clients after service", "Follow up every visit to determine satisfaction", "Never contact clients", "Only focus on new clients"],
                answer: 1
            }
        ];

        let userAnswers = new Array(quizData.length).fill(null);

        function renderQuiz() {
            const form = document.getElementById('quiz-form');
            form.innerHTML = quizData.map((q, i) => `
                <div class="question" id="q${i}">
                    <span class="question-number">Question ${i + 1} of ${quizData.length}</span>
                    <p class="question-text">${q.question}</p>
                    <div class="options">
                        ${q.options.map((opt, j) => `
                            <label>
                                <input type="radio" name="q${i}" value="${j}" onchange="selectAnswer(${i}, ${j})">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(a => a !== null).length;
            const progress = (answered / quizData.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function submitQuiz() {
            const answered = userAnswers.filter(a => a !== null).length;
            if (answered < quizData.length) {
                alert(`Please answer all questions. You have ${quizData.length - answered} remaining.`);
                const firstUnanswered = userAnswers.findIndex(a => a === null);
                document.getElementById(`q${firstUnanswered}`).scrollIntoView({ behavior: 'smooth' });
                return;
            }

            let score = 0;
            const review = [];

            quizData.forEach((q, i) => {
                const correct = userAnswers[i] === q.answer;
                if (correct) score++;
                review.push({
                    question: q.question,
                    userAnswer: q.options[userAnswers[i]],
                    correctAnswer: q.options[q.answer],
                    correct: correct
                });
            });

            const percentage = Math.round((score / quizData.length) * 100);
            let message = '';
            if (percentage >= 90) message = '🎉 Excellent! You understand the business of barbering!';
            else if (percentage >= 80) message = '👏 Great job! You know your business concepts!';
            else if (percentage >= 70) message = '👍 Good work! Keep studying!';
            else message = '📚 Keep studying! Review the chapter and try again.';

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="score">${score}/${quizData.length}</div>
                <p class="results-message">${percentage}% — ${message}</p>
                <h3 style="margin: 2rem 0 1rem; color: var(--gold);">Review</h3>
                ${review.map((r, i) => `
                    <div class="review-item ${r.correct ? 'correct' : 'incorrect'}">
                        <strong>Q${i + 1}:</strong> ${r.question}<br>
                        <span style="color: ${r.correct ? 'var(--success)' : 'var(--error)'}">
                            Your answer: ${r.userAnswer} ${r.correct ? '✓' : '✗'}
                        </span>
                        ${!r.correct ? `<br><span style="color: var(--success)">Correct: ${r.correctAnswer}</span>` : ''}
                    </div>
                `).join('')}
                <button class="submit-btn" onclick="retakeQuiz()" style="margin-top: 2rem;">Retake Quiz</button>
            `;
            resultsDiv.classList.add('show');
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function retakeQuiz() {
            userAnswers = new Array(quizData.length).fill(null);
            document.getElementById('results').classList.remove('show');
            renderQuiz();
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderQuiz();
    </script>
</body>
</html>
