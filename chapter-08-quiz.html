<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 8 Quiz - Basics of Electricity - Barber Study Pro</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #1a1a1a;
            --dark-gray: #2d2d2d;
            --medium-gray: #3d3d3d;
            --light-gray: #888;
            --white: #f5f5f5;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--white);
            line-height: 1.6;
        }
        .progress-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--dark-gray); z-index: 1000;
        }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
        nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: sticky; top: 4px;
            border-bottom: 1px solid var(--medium-gray);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--gold); text-decoration: none; }
        .back-link { color: var(--light-gray); text-decoration: none; }
        .back-link:hover { color: var(--gold); }
        .container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .quiz-header { text-align: center; margin-bottom: 3rem; }
        .quiz-header h1 { color: var(--gold); margin-bottom: 1rem; }
        .quiz-header p { color: var(--light-gray); }
        .quiz-section { background: var(--medium-gray); border-radius: 12px; padding: 2rem; margin: 3rem 0; border: 1px solid var(--gold); }
        .quiz-section h2 { color: var(--gold); margin-bottom: 1.5rem; }
        .quiz-question { margin-bottom: 1.5rem; }
        .quiz-question p { font-weight: 600; margin-bottom: 0.75rem; color: var(--white); }
        .quiz-options label { display: block; padding: 0.75rem 1rem; margin-bottom: 0.5rem; background: var(--dark-gray); border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .quiz-options label:hover { background: rgba(212, 175, 55, 0.1); }
        .quiz-options input[type="radio"] { margin-right: 0.75rem; }
        .quiz-submit { background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .quiz-result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; }
        .quiz-result.correct { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; }
        .quiz-result.incorrect { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⚡ Barber Study Pro</a>
            <a href="chapter-08.html" class="back-link">← Back to Chapter 8</a>
        </div>
    </nav>
    <div class="container">
        <div class="quiz-header">
            <h1>Chapter 8: Basics of Electricity</h1>
            <p>Comprehensive Review Quiz - 40 Questions</p>
        </div>
        <section class="quiz-section">
            <h2>📝 Chapter 8 Comprehensive Review Quiz</h2>
            <p style="color: var(--light-gray); margin-bottom: 2rem;">Test your knowledge of electrical concepts, safety, electrotherapy, and light therapy.</p>
            <div id="quiz-container"></div>
            <button class="quiz-submit" onclick="checkQuiz()">Check Answers</button>
            <div class="quiz-result" id="quiz-result"></div>
        </section>
    </div>
    <script>
        const quizData = [
            {q: "1. What is electricity?", a: ["A form of matter", "A form of energy that produces physical, magnetic, chemical, or thermal effects", "A type of conductor", "A safety device"], correct: 1},
            {q: "2. Does electricity occupy space or have mass?", a: ["Yes, it has both", "No, it is not matter", "Only mass, not space", "Only space, not mass"], correct: 1},
            {q: "3. What is an electric current?", a: ["A safety device", "The flow of electricity along a conductor", "A type of insulator", "A measurement of power"], correct: 1},
            {q: "4. What is a conductor?", a: ["A substance that blocks electricity", "A substance that conducts electricity", "A safety device", "A type of current"], correct: 1},
            {q: "5. Which of these is a conductor?", a: ["Rubber", "Metal", "Glass", "Dry wood"], correct: 1},
            {q: "6. Which of these is an insulator?", a: ["Copper", "Rubber", "Carbon", "Human body"], correct: 1},
            {q: "7. What is a complete electric circuit?", a: ["A broken wire", "The path of electric current from source through conductors and back", "A safety device", "A type of electrode"], correct: 1},
            {q: "8. What type of current travels in one direction only?", a: ["Alternating current", "Direct current", "Galvanic current", "Tesla current"], correct: 1},
            {q: "9. What type of current travels in two directions?", a: ["Direct current", "Alternating current", "Microcurrent", "Iontophoresis"], correct: 1},
            {q: "10. What does DC produce?", a: ["Mechanical action", "Chemical reaction", "Heat only", "Light only"], correct: 1},
            {q: "11. What does AC produce?", a: ["Chemical reaction", "Mechanical action", "Static electricity", "Solar power"], correct: 1},
            {q: "12. What converts DC to AC?", a: ["Rectifier", "Converter", "Transformer", "Resistor"], correct: 1},
            {q: "13. What converts AC to DC?", a: ["Converter", "Rectifier", "Amplifier", "Capacitor"], correct: 1},
            {q: "14. What does a volt measure?", a: ["Current strength", "Electrical pressure", "Resistance", "Power"], correct: 1},
            {q: "15. What does an amp measure?", a: ["Electrical pressure", "Strength or rate of electric current", "Resistance", "Frequency"], correct: 1},
            {q: "16. What is a milliampere?", a: ["One millionth of an ampere", "One-thousandth of an ampere", "One hundredth of an ampere", "One tenth of an ampere"], correct: 1},
            {q: "17. What does an ohm measure?", a: ["Current", "Voltage", "Electrical resistance", "Power"], correct: 2},
            {q: "18. What is a watt?", a: ["Unit of resistance", "Unit of power", "Unit of voltage", "Unit of frequency"], correct: 1},
            {q: "19. How many watts are in a kilowatt?", a: ["10", "100", "1,000", "10,000"], correct: 2},
            {q: "20. What does a fuse do?", a: ["Increases current flow", "Prevents overheating of electrical wires", "Stores electricity", "Converts AC to DC"], correct: 1},
            {q: "21. What happens when a fuse blows?", a: ["It can be reset", "It melts and must be replaced", "It increases voltage", "It stores energy"], correct: 1},
            {q: "22. What is a circuit breaker?", a: ["A type of fuse", "A switch that automatically shuts off overloaded circuits", "A power converter", "An electrode"], correct: 1},
            {q: "23. What is the purpose of grounding?", a: ["To increase voltage", "To promote electrical safety", "To store electricity", "To convert currents"], correct: 1},
            {q: "24. What is a GFI?", a: ["A type of electrode", "An outlet that senses electrical imbalances", "A power converter", "A light bulb"], correct: 1},
            {q: "25. Where are GFIs required?", a: ["Only in offices", "Near sinks and water sources", "Only outdoors", "In storage rooms"], correct: 1},
            {q: "26. What is electrotherapy?", a: ["A type of light bulb", "Electronic facial and scalp treatments", "A safety device", "A measurement unit"], correct: 1},
            {q: "27. What is an electrode?", a: ["A safety device", "An applicator that directs current to the skin", "A type of current", "A measurement unit"], correct: 1},
            {q: "28. What is polarity?", a: ["A type of treatment", "The negative or positive pole of electric current", "A safety device", "A measurement unit"], correct: 1},
            {q: "29. What is the anode?", a: ["Negative pole", "Positive pole", "Neutral wire", "Ground wire"], correct: 1},
            {q: "30. What is the cathode?", a: ["Positive pole", "Negative electrode", "Ground wire", "Neutral wire"], correct: 1},
            {q: "31. What does the positive pole of galvanic current do?", a: ["Opens pores", "Closes pores", "Increases blood supply", "Softens tissues"], correct: 1},
            {q: "32. What does the negative pole of galvanic current do?", a: ["Closes pores", "Opens pores", "Decreases blood supply", "Contracts blood vessels"], correct: 1},
            {q: "33. What is desincrustation?", a: ["A type of light therapy", "Deep pore cleansing using galvanic current", "A safety device", "A measurement unit"], correct: 1},
            {q: "34. What is iontophoresis?", a: ["A type of electrode", "Introducing water-soluble products into skin", "A safety device", "A measurement unit"], correct: 1},
            {q: "35. What is microcurrent?", a: ["High voltage electricity", "Extremely low level of electricity mirroring body's natural impulses", "A type of light", "A safety device"], correct: 1},
            {q: "36. What is Tesla high-frequency current also called?", a: ["Blue ray", "Violet ray", "Red ray", "Green ray"], correct: 1},
            {q: "37. What percentage of natural sunlight is visible light?", a: ["15%", "25%", "35%", "50%"], correct: 2},
            {q: "38. What percentage of natural sunlight is invisible light?", a: ["35%", "50%", "65%", "75%"], correct: 2},
            {q: "39. What does LED blue light do?", a: ["Increases circulation", "Reduces acne and bacteria", "Stimulates collagen", "Reduces swelling"], correct: 1},
            {q: "40. What does LED red light do?", a: ["Reduces acne", "Increases circulation and improves collagen production", "Reduces swelling", "Calms and soothes"], correct: 1}
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            quizData.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'quiz-question';
                qDiv.innerHTML = `
                    <p>${item.q}</p>
                    <div class="quiz-options">
                        ${item.a.map((opt, i) => `
                            <label><input type="radio" name="q${index + 1}" value="${i}"> ${opt}</label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function checkQuiz() {
            let score = 0;
            let total = quizData.length;
            
            quizData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index + 1}"]:checked`);
                if (selected && parseInt(selected.value) === item.correct) score++;
            });
            
            const resultDiv = document.getElementById('quiz-result');
            resultDiv.style.display = 'block';
            if (score === total) {
                resultDiv.className = 'quiz-result correct';
                resultDiv.innerHTML = `<strong>Perfect! 🎉</strong> You got ${score}/${total} correct!`;
            } else {
                resultDiv.className = 'quiz-result incorrect';
                resultDiv.innerHTML = `<strong>Keep studying!</strong> You got ${score}/${total} correct.`;
            }
        }

        renderQuiz();

        window.addEventListener('scroll', () => {
            const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            document.getElementById('progress').style.width = scrolled + '%';
        });
    </script>
</body>
</html>
