            document.getElementById('currentCard').textContent = currentIndex + 1;
            document.getElementById('cardTerm').textContent = term.term;
            document.getElementById('cardPhonetic').textContent = term.phonetic || '';
            document.getElementById('cardChapter').textContent = `Chapter ${term.chapter}`;

        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % currentCards.length;
            updateCard();
        }

        function previousCard() {
            currentIndex = (currentIndex - 1 + currentCards.length) % currentCards.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = currentCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        function filterByChapter(chapter) {
            document.querySelectorAll('#filterTabs .filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            if (chapter === 'all') {
                currentCards = [...keyTerms];
            } else if (chapter === 1) {
                currentCards = keyTerms.filter(t => t.chapter >= 1 && t.chapter <= 5);
            } else if (chapter === 6) {
                currentCards = keyTerms.filter(t => t.chapter >= 6 && t.chapter <= 10);
            } else if (chapter === 11) {
                currentCards = keyTerms.filter(t => t.chapter >= 11 && t.chapter <= 15);
            } else if (chapter === 16) {
                currentCards = keyTerms.filter(t => t.chapter >= 16 && t.chapter <= 21);
            }

            currentIndex = 0;
            document.getElementById('totalCards').textContent = currentCards.length;
            updateCard();
        }

        function searchTerms() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                currentCards = [...keyTerms];
            } else {
                currentCards = keyTerms.filter(t => 
                    t.term.toLowerCase().includes(query) || 
                    t.definition.toLowerCase().includes(query)
                );
            }
            currentIndex = 0;
            document.getElementById('totalCards').textContent = currentCards.length;
            updateCard();
        }

        function switchView(view) {
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (view === 'flashcards') {
                document.getElementById('flashcardView').style.display = 'block';
                document.getElementById('listView').style.display = 'none';
                document.getElementById('filterTabs').style.display = 'flex';
            } else {
                document.getElementById('flashcardView').style.display = 'none';
                document.getElementById('listView').style.display = 'block';
                document.getElementById('filterTabs').style.display = 'none';
                renderTermsList();
            }
        }

        function renderTermsList() {
            const container = document.getElementById('termsListContainer');
            container.innerHTML = currentCards.map(t => `
                <div style="background: var(--dark-gray); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--medium-gray);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                        <span style="font-size: 1.25rem; font-weight: 600; color: var(--gold);">${t.term}</span>
                        <span style="background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem;">Chapter ${t.chapter}</span>
                    </div>
                    ${t.phonetic ? `<div style="color: var(--light-gray); font-style: italic; margin-bottom: 0.5rem;">${t.phonetic}</div>` : ''}
                    <div style="color: var(--white); line-height: 1.7;">${t.definition}</div>
                </div>
            `).join('');
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') previousCard();
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                flipCard();
            }
        });

        // Update progress bar
        window.addEventListener('scroll', () => {
            const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            document.getElementById('progress').style.width = scrolled + '%';
        });

        // Initialize
        init();
    </script>
</body>
</html>
