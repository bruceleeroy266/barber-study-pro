<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 13 Quiz: Shaving & Facial Hair Design | Barber Study Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --dark-gray: #1a1a1a; --medium-gray: #2a2a2a; --light-gray: #888; --white: #ffffff; --success: #22c55e; --error: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); line-height: 1.7; }
        nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--medium-gray); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.25rem; font-weight: 800; color: var(--gold); text-decoration: none; }
        .back-link { color: var(--light-gray); text-decoration: none; }
        .quiz-header { padding: 8rem 2rem 4rem; background: linear-gradient(135deg, var(--dark-gray) 0%, var(--dark) 100%); text-align: center; }
        .quiz-header h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; margin-bottom: 1rem; }
        .quiz-container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
        .progress-bar { position: fixed; top: 65px; left: 0; right: 0; height: 3px; background: var(--medium-gray); z-index: 999; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
        .question { background: var(--dark-gray); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--medium-gray); }
        .question-number { display: inline-block; background: var(--gold); color: var(--dark); padding: 0.25rem 0.75rem; border-radius: 20px; font-weight: 700; font-size: 0.875rem; margin-bottom: 1rem; }
        .question-text { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.5rem; }
        .options label { display: block; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: var(--medium-gray); border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 2px solid transparent; }
        .options label:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); }
        .options input[type="radio"] { margin-right: 0.75rem; }
        .submit-btn { background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 2rem; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
        .results { background: var(--dark-gray); border-radius: 12px; padding: 2rem; margin-top: 2rem; text-align: center; display: none; }
        .results.show { display: block; }
        .score { font-size: 3rem; font-weight: 800; color: var(--gold); margin-bottom: 1rem; }
        .results-message { font-size: 1.25rem; margin-bottom: 1.5rem; }
        .review-item { text-align: left; padding: 1rem; margin: 0.5rem 0; border-radius: 8px; }
        .review-item.correct { background: rgba(34, 197, 94, 0.1); border-left: 4px solid var(--success); }
        .review-item.incorrect { background: rgba(239, 68, 68, 0.1); border-left: 4px solid var(--error); }
        .nav-chapters { display: flex; justify-content: space-between; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--medium-gray); }
        .nav-chapters a { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <nav><div class="nav-container"><a href="index.html" class="logo">⚡ Barber Study Pro</a><a href="chapter-13.html" class="back-link">← Back to Chapter</a></div></nav>
    <header class="quiz-header">
        <h1>Chapter 13 Quiz</h1>
        <p>Shaving and Facial Hair Design</p>
    </header>
    <main class="quiz-container">
        <div id="quiz-form"></div>
        <button class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
        <div class="results" id="results"></div>
        <div class="nav-chapters"><a href="chapter-12-quiz.html">← Chapter 12 Quiz</a><a href="chapter-14-quiz.html">Chapter 14 Quiz →</a></div>
    </main>
    <script>
        const quizData = [
            {
                question: "What is the first step in preparing a client for a shave?",
                options: ["Apply shaving cream", "Drape the client and position them comfortably", "Start with the razor", "Apply aftershave"],
                answer: 1
            },
            {
                question: "What is the purpose of applying a hot towel before shaving?",
                options: ["To disinfect the skin", "To soften the beard and open pores", "To remove dirt only", "To apply fragrance"],
                answer: 1
            },
            {
                question: "How many standard areas of the face are there for shaving?",
                options: ["10", "12", "14", "16"],
                answer: 2
            },
            {
                question: "What is the 'first time over' shave?",
                options: ["Shaving against the grain", "The first pass over the 14 areas of the face", "A quick shave without preparation", "Shaving with an electric razor"],
                answer: 1
            },
            {
                question: "What stroke is used by right-handed barbers when shaving the left side of the face?",
                options: ["Backhand stroke", "Freehand stroke", "Reverse stroke", "Cross stroke"],
                answer: 0
            },
            {
                question: "At what angle should the straight razor be held against the skin?",
                options: ["15 degrees", "30 degrees", "45 degrees", "90 degrees"],
                answer: 1
            },
            {
                question: "What is the direction of hair growth called?",
                options: ["Against the grain", "With the grain", "Cross grain", "Hair pattern"],
                answer: 1
            },
            {
                question: "What should be applied after shaving to soothe the skin?",
                options: ["More hot towels", "Aftershave or moisturizer", "Alcohol-based astringent only", "Shaving cream"],
                answer: 1
            },
            {
                question: "What is the term for shaving against the grain during the second pass?",
                options: ["First time over", "Second time over", "Reverse shave", "Against shave"],
                answer: 1
            },
            {
                question: "How should the skin be stretched during shaving?",
                options: ["Not stretched at all", "Stretched taut with the free hand", "Pushed inward", "Rubbed vigorously"],
                answer: 1
            }
        ];

        let userAnswers = new Array(quizData.length).fill(null);

        function renderQuiz() {
            const form = document.getElementById('quiz-form');
            form.innerHTML = quizData.map((q, i) => `
                <div class="question" id="q${i}">
                    <span class="question-number">Question ${i + 1} of ${quizData.length}</span>
                    <p class="question-text">${q.question}</p>
                    <div class="options">
                        ${q.options.map((opt, j) => `
                            <label>
                                <input type="radio" name="q${i}" value="${j}" onchange="selectAnswer(${i}, ${j})">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(a => a !== null).length;
            const progress = (answered / quizData.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function submitQuiz() {
            const answered = userAnswers.filter(a => a !== null).length;
            if (answered < quizData.length) {
                alert(`Please answer all questions. You have ${quizData.length - answered} remaining.`);
                const firstUnanswered = userAnswers.findIndex(a => a === null);
                document.getElementById(`q${firstUnanswered}`).scrollIntoView({ behavior: 'smooth' });
                return;
            }

            let score = 0;
            const review = [];

            quizData.forEach((q, i) => {
                const correct = userAnswers[i] === q.answer;
                if (correct) score++;
                review.push({
                    question: q.question,
                    userAnswer: q.options[userAnswers[i]],
                    correctAnswer: q.options[q.answer],
                    correct: correct
                });
            });

            const percentage = Math.round((score / quizData.length) * 100);
            let message = '';
            if (percentage >= 90) message = '🎉 Excellent! You\'re a shaving expert!';
            else if (percentage >= 80) message = '👏 Great job! You know your shaving techniques!';
            else if (percentage >= 70) message = '👍 Good work! Keep studying!';
            else message = '📚 Keep studying! Review the chapter and try again.';

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="score">${score}/${quizData.length}</div>
                <p class="results-message">${percentage}% — ${message}</p>
                <h3 style="margin: 2rem 0 1rem; color: var(--gold);">Review</h3>
                ${review.map((r, i) => `
                    <div class="review-item ${r.correct ? 'correct' : 'incorrect'}">
                        <strong>Q${i + 1}:</strong> ${r.question}<br>
                        <span style="color: ${r.correct ? 'var(--success)' : 'var(--error)'}">
                            Your answer: ${r.userAnswer} ${r.correct ? '✓' : '✗'}
                        </span>
                        ${!r.correct ? `<br><span style="color: var(--success)">Correct: ${r.correctAnswer}</span>` : ''}
                    </div>
                `).join('')}
                <button class="submit-btn" onclick="retakeQuiz()" style="margin-top: 2rem;">Retake Quiz</button>
            `;
            resultsDiv.classList.add('show');
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function retakeQuiz() {
            userAnswers = new Array(quizData.length).fill(null);
            document.getElementById('results').classList.remove('show');
            renderQuiz();
            updateProgress();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        renderQuiz();
    </script>
</body>
</html>
