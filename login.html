<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Barber Study Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --dark-gray: #1a1a1a; --medium-gray: #2a2a2a; --light-gray: #888; --white: #ffffff; --red: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); line-height: 1.7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .auth-container { background: var(--dark-gray); padding: 3rem; border-radius: 16px; border: 1px solid var(--medium-gray); width: 100%; max-width: 420px; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header .logo { font-size: 2rem; font-weight: 800; color: var(--gold); margin-bottom: 0.5rem; }
        .auth-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--light-gray); }
        
        .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--medium-gray); padding: 0.25rem; border-radius: 8px; }
        .auth-tab { flex: 1; padding: 0.75rem; background: transparent; border: none; color: var(--light-gray); font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.3s; }
        .auth-tab.active { background: var(--gold); color: var(--dark); }
        
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.875rem 1rem; background: var(--medium-gray); border: 1px solid var(--medium-gray); border-radius: 8px; color: var(--white); font-size: 1rem; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--gold); }
        .form-group input::placeholder { color: var(--light-gray); }
        
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem; }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; }
        .remember-me input { width: auto; }
        .forgot-password { color: var(--gold); text-decoration: none; }
        .forgot-password:hover { text-decoration: underline; }
        
        .auth-btn { width: 100%; background: var(--gold); color: var(--dark); padding: 1rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .auth-btn:hover { background: #e5c04a; transform: translateY(-1px); }
        
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--light-gray); font-size: 0.875rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--medium-gray); }
        
        .social-login { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .social-btn { flex: 1; padding: 0.75rem; background: var(--medium-gray); border: 1px solid var(--medium-gray); border-radius: 8px; color: var(--white); font-weight: 500; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .social-btn:hover { border-color: var(--gold); }
        
        .error-message { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; font-size: 0.9rem; }
        .error-message.show { display: block; }
        
        .success-message { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); color: var(--success); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; font-size: 0.9rem; }
        .success-message.show { display: block; }
        
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--light-gray); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--gold); }
        
        .terms { font-size: 0.8rem; color: var(--light-gray); text-align: center; margin-top: 1.5rem; }
        .terms a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">Barber Study Pro</div>
            <h1>Welcome Back</h1>
            <p>Sign in to track your progress</p>
        </div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
            <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <!-- Login Form -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password" onclick="showForgotPassword()">Forgot password?</a>
            </div>
            
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="registerName">Full Name</label>
                <input type="text" id="registerName" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input type="password" id="registerPassword" required placeholder="Create a password" minlength="6">
            </div>
            
            <div class="form-group">
                <label for="registerConfirm">Confirm Password</label>
                <input type="password" id="registerConfirm" required placeholder="Confirm your password">
            </div>
            
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
        
        <div class="divider">or continue with</div>
        
        <div class="social-login">
            <button class="social-btn" onclick="socialLogin('google')">
                <span>🔍</span> Google
            </button>
            <button class="social-btn" onclick="socialLogin('apple')">
                <span>🍎</span> Apple
            </button>
        </div>
        
        <p class="terms">By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>
        
        <a href="index.html" class="back-link">← Back to Website</a>
    </div>

    <script>
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            hideMessages();
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }
        
        // Login handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('bsp_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Set session
                const sessionData = {
                    email: user.email,
                    name: user.name,
                    loginTime: Date.now(),
                    isLoggedIn: true
                };
                
                // Always store in localStorage for persistence
                localStorage.setItem('bsp_session', JSON.stringify(sessionData));
                
                // Also store login credentials if remember me is checked
                if (rememberMe) {
                    localStorage.setItem('bsp_remember_email', email);
                } else {
                    localStorage.removeItem('bsp_remember_email');
                }
                
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'student-dashboard.html';
                }, 1000);
            } else {
                showError('Invalid email or password');
            }
        });
        
        // Register handler
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            // Validation
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('bsp_users') || '[]');
            
            // Check if email exists
            if (users.find(u => u.email === email)) {
                showError('Email already registered');
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                password: password,
                createdAt: new Date().toISOString(),
                progress: {},
                quizScores: {}
            };
            
            users.push(newUser);
            localStorage.setItem('bsp_users', JSON.stringify(users));
            
            showSuccess('Account created! Please sign in.');
            setTimeout(() => {
                switchTab('login');
                document.getElementById('loginEmail').value = email;
            }, 1500);
        });
        
        // Social login (placeholder)
        function socialLogin(provider) {
            showError(`${provider} login coming soon!`);
        }
        
        // Forgot password (placeholder)
        function showForgotPassword() {
            showError('Password reset coming soon! Contact support.');
        }
        
        // Check if already logged in
        const session = JSON.parse(localStorage.getItem('bsp_session') || '{}');
        if (session.email) {
            window.location.href = 'student-dashboard.html';
        }
        
        // Auto-fill remembered email
        const rememberedEmail = localStorage.getItem('bsp_remember_email');
        if (rememberedEmail) {
            document.getElementById('loginEmail').value = rememberedEmail;
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
</html>
