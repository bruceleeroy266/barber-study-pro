<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 9 Quiz - The Skin - Barber Study Pro</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #1a1a1a;
            --dark-gray: #2d2d2d;
            --medium-gray: #3d3d3d;
            --light-gray: #888;
            --white: #f5f5f5;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--white);
            line-height: 1.6;
        }
        .progress-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--dark-gray); z-index: 1000;
        }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
        nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: sticky; top: 4px;
            border-bottom: 1px solid var(--medium-gray);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--gold); text-decoration: none; }
        .back-link { color: var(--light-gray); text-decoration: none; }
        .back-link:hover { color: var(--gold); }
        .container { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .quiz-header { text-align: center; margin-bottom: 3rem; }
        .quiz-header h1 { color: var(--gold); margin-bottom: 1rem; }
        .quiz-header p { color: var(--light-gray); }
        .quiz-section { background: var(--medium-gray); border-radius: 12px; padding: 2rem; margin: 3rem 0; border: 1px solid var(--gold); }
        .quiz-section h2 { color: var(--gold); margin-bottom: 1.5rem; }
        .quiz-question { margin-bottom: 1.5rem; }
        .quiz-question p { font-weight: 600; margin-bottom: 0.75rem; color: var(--white); }
        .quiz-options label { display: block; padding: 0.75rem 1rem; margin-bottom: 0.5rem; background: var(--dark-gray); border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .quiz-options label:hover { background: rgba(212, 175, 55, 0.1); }
        .quiz-options input[type="radio"] { margin-right: 0.75rem; }
        .quiz-submit { background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .quiz-result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; }
        .quiz-result.correct { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; }
        .quiz-result.incorrect { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⚡ Barber Study Pro</a>
            <a href="chapter-09.html" class="back-link">← Back to Chapter 9</a>
        </div>
    </nav>
    <div class="container">
        <div class="quiz-header">
            <h1>Chapter 9: The Skin</h1>
            <p>Comprehensive Review Quiz - 55 Questions</p>
        </div>
        <section class="quiz-section">
            <h2>📝 Chapter 9 Comprehensive Review Quiz</h2>
            <p style="color: var(--light-gray); margin-bottom: 2rem;">Test your knowledge of skin structure, disorders, and diseases.</p>
            <div id="quiz-container"></div>
            <button class="quiz-submit" onclick="checkQuiz()">Check Answers</button>
            <div class="quiz-result" id="quiz-result"></div>
        </section>
    </div>
    <script>
        const quizData = [
            {q: "1. What is the largest organ of the body?", a: ["Heart", "Skin", "Liver", "Brain"], correct: 1},
            {q: "2. What is dermatology?", a: ["Study of hair", "Study of skin, its nature, structure, functions, diseases, and treatment", "Study of nails", "Study of muscles"], correct: 1},
            {q: "3. What is the outermost protective layer of the skin?", a: ["Dermis", "Epidermis", "Subcutaneous tissue", "Muscle"], correct: 1},
            {q: "4. How many layers does the epidermis have?", a: ["3", "4", "5", "6"], correct: 2},
            {q: "5. What is the outermost layer of the epidermis?", a: ["Stratum lucidum", "Stratum corneum", "Stratum granulosum", "Stratum spinosum"], correct: 1},
            {q: "6. What protein makes up the stratum corneum?", a: ["Collagen", "Keratin", "Elastin", "Melanin"], correct: 1},
            {q: "7. What is the deepest layer of the epidermis?", a: ["Stratum corneum", "Stratum germinativum", "Stratum lucidum", "Stratum granulosum"], correct: 1},
            {q: "8. What cells produce melanin?", a: ["Keratinocytes", "Melanocytes", "Fibroblasts", "Lymphocytes"], correct: 1},
            {q: "9. What is the dermis also called?", a: ["Cuticle", "True skin", "Scarf skin", "Outer layer"], correct: 1},
            {q: "10. How many times thicker is the dermis than the epidermis?", a: ["10 times", "15 times", "25 times", "50 times"], correct: 2},
            {q: "11. What are the two layers of the dermis?", a: ["Inner and outer", "Papillary and reticular", "Top and bottom", "Front and back"], correct: 1},
            {q: "12. What is subcutaneous tissue also called?", a: ["Muscle tissue", "Adipose tissue", "Bone tissue", "Nerve tissue"], correct: 1},
            {q: "13. What are sudoriferous glands?", a: ["Oil glands", "Sweat glands", "Hair follicles", "Blood vessels"], correct: 1},
            {q: "14. What do sebaceous glands secrete?", a: ["Sweat", "Sebum", "Blood", "Lymph"], correct: 1},
            {q: "15. What is the primary function of sebum?", a: ["To cool the body", "To act as a shield preventing moisture evaporation", "To produce vitamin D", "To fight bacteria"], correct: 1},
            {q: "16. How many principal functions does the skin have?", a: ["4", "5", "6", "7"], correct: 2},
            {q: "17. What is the normal body temperature?", a: ["96.8°F", "97.6°F", "98.6°F", "99.4°F"], correct: 2},
            {q: "18. What part of the brain regulates body temperature?", a: ["Cerebrum", "Hypothalamus", "Cerebellum", "Medulla"], correct: 1},
            {q: "19. What is a lesion?", a: ["A type of gland", "A mark on the skin indicating injury or damage", "A muscle", "A bone"], correct: 1},
            {q: "20. What is a primary lesion?", a: ["A lesion that develops from another lesion", "A lesion that is a different color or raised above the surface", "Only scars", "Only crusts"], correct: 1},
            {q: "21. What is a bulla?", a: ["A small pimple", "A large blister containing watery fluid", "A type of scar", "A flat spot"], correct: 1},
            {q: "22. What is a macule?", a: ["A raised bump", "A flat spot or discoloration on the skin", "A type of cyst", "A scar"], correct: 1},
            {q: "23. What is a pustule?", a: ["A flat spot", "A raised, inflamed papule with pus in the center", "A scar", "A fissure"], correct: 1},
            {q: "24. What is a secondary lesion?", a: ["The first lesion to appear", "A lesion characterized by accumulation of material on the skin surface", "Only primary lesions", "Only cysts"], correct: 1},
            {q: "25. What is a crust?", a: ["A fresh wound", "Dead cells that form over a wound while healing", "A type of gland", "A muscle"], correct: 1},
            {q: "26. What is a keloid?", a: ["A flat scar", "A thick scar from excessive growth of fibrous tissue", "A type of acne", "A mole"], correct: 1},
            {q: "27. What is hyperpigmentation?", a: ["Absence of pigment", "Darker than normal pigmentation", "Only freckles", "Only albinism"], correct: 1},
            {q: "28. What is hypopigmentation?", a: ["Darker than normal pigmentation", "Absence of pigment resulting in light or white splotches", "Only tanning", "Only moles"], correct: 1},
            {q: "29. What is albinism?", a: ["Excess pigment", "Congenital hypopigmentation or absence of melanin", "Only freckles", "Only tanning"], correct: 1},
            {q: "30. What is vitiligo?", a: ["Excess pigment", "A hereditary condition causing hypopigmented spots and splotches", "Only tanning", "Only moles"], correct: 1},
            {q: "31. What is a callus?", a: ["A type of cancer", "An acquired, superficial, thickened patch of epidermis", "A type of acne", "A mole"], correct: 1},
            {q: "32. What is a verruca?", a: ["A type of acne", "A wart, a hypertrophy of papillae and epidermis caused by a virus", "A mole", "A freckle"], correct: 1},
            {q: "33. What is the most common and least severe type of skin cancer?", a: ["Squamous cell carcinoma", "Basal cell carcinoma", "Malignant melanoma", "Keratoma"], correct: 1},
            {q: "34. What is the most serious type of skin cancer?", a: ["Basal cell carcinoma", "Squamous cell carcinoma", "Malignant melanoma", "Keratoma"], correct: 2},
            {q: "35. What does the ABCDE checklist stand for?", a: ["Age, Blood, Color, Diameter, Evolution", "Asymmetry, Border, Color, Diameter, Evolution", "Age, Border, Condition, Diameter, Evolution", "Asymmetry, Blood, Color, Depth, Evolution"], correct: 1},
            {q: "36. What is anhidrosis?", a: ["Excessive sweating", "Deficiency in perspiration or inability to sweat", "Foul-smelling perspiration", "Prickly heat"], correct: 1},
            {q: "37. What is hyperhidrosis?", a: ["Deficiency in perspiration", "Excessive sweating", "Foul-smelling perspiration", "Prickly heat"], correct: 1},
            {q: "38. What is bromhidrosis?", a: ["Excessive sweating", "Foul-smelling perspiration", "Deficiency in perspiration", "Prickly heat"], correct: 1},
            {q: "39. What is dermatitis?", a: ["A type of cancer", "A general term for inflammatory condition of the skin", "A type of acne", "A mole"], correct: 1},
            {q: "40. What is eczema?", a: ["A contagious skin disease", "An inflammatory skin disease that is not contagious", "A type of cancer", "A wart"], correct: 1},
            {q: "41. What is psoriasis?", a: ["A contagious skin disease", "A chronic inflammatory skin disease characterized by dry red patches with silvery scales", "A type of acne", "A wart"], correct: 1},
            {q: "42. What is herpes simplex I?", a: ["A bacterial infection", "A recurring viral infection that produces fever blisters or cold sores", "A fungal infection", "A type of acne"], correct: 1},
            {q: "43. What is acne?", a: ["A bacterial infection", "A skin disorder characterized by chronic inflammation of sebaceous glands", "A fungal infection", "A type of wart"], correct: 1},
            {q: "44. What is a blackhead?", a: ["A closed comedo", "An open comedo where sebum has oxidized and turned black", "A type of cyst", "A mole"], correct: 1},
            {q: "45. What is a whitehead?", a: ["An open comedo", "A closed comedo where sebum remains white or cream color", "A blackhead", "A cyst"], correct: 1},
            {q: "46. What is milia?", a: ["A type of acne", "Benign, keratin-filled cysts appearing just under epidermis", "A blackhead", "A wart"], correct: 1},
            {q: "47. What is rosacea?", a: ["A type of acne", "A chronic condition appearing primarily on cheeks and nose, characterized by flushing and redness", "A wart", "A mole"], correct: 1},
            {q: "48. What is seborrheic dermatitis?", a: ["A type of acne", "A skin condition caused by inflammation of sebaceous glands", "A wart", "A mole"], correct: 1},
            {q: "49. What is the survival rate for basal cell carcinoma with early diagnosis?", a: ["50%", "70%", "90%", "100%"], correct: 2},
            {q: "50. What is the 5-year survival rate for malignant melanoma with early detection?", a: ["50%", "62%", "94%", "100%"], correct: 2},
            {q: "51. Where are sweat glands most numerous?", a: ["On the back", "On palms, soles, forehead, and armpits", "On the legs", "On the arms"], correct: 1},
            {q: "52. What is collagen?", a: ["A type of fat", "A protein fiber that gives skin strength and form", "A type of oil", "A type of sweat"], correct: 1},
            {q: "53. What is elastin?", a: ["A type of fat", "A protein that gives skin elasticity", "A type of oil", "A type of sweat"], correct: 1},
            {q: "54. What is the thinnest skin on the body?", a: ["On the palms", "On the eyelids", "On the soles", "On the back"], correct: 1},
            {q: "55. What is the thickest skin on the body?", a: ["On the eyelids", "On the palms of hands and soles of feet", "On the face", "On the neck"], correct: 1}
        ];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            quizData.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'quiz-question';
                qDiv.innerHTML = `
                    <p>${item.q}</p>
                    <div class="quiz-options">
                        ${item.a.map((opt, i) => `
                            <label><input type="radio" name="q${index + 1}" value="${i}"> ${opt}</label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function checkQuiz() {
            let score = 0;
            let total = quizData.length;
            
            quizData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index + 1}"]:checked`);
                if (selected && parseInt(selected.value) === item.correct) score++;
            });
            
            const resultDiv = document.getElementById('quiz-result');
            resultDiv.style.display = 'block';
            if (score === total) {
                resultDiv.className = 'quiz-result correct';
                resultDiv.innerHTML = `<strong>Perfect! 🎉</strong> You got ${score}/${total} correct!`;
            } else {
                resultDiv.className = 'quiz-result incorrect';
                resultDiv.innerHTML = `<strong>Keep studying!</strong> You got ${score}/${total} correct.`;
            }
        }

        renderQuiz();

        window.addEventListener('scroll', () => {
            const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            document.getElementById('progress').style.width = scrolled + '%';
        });
    </script>
</body>
</html>
